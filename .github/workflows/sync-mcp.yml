name: Sync MCP Server

# Drop this workflow into any repo that has an openapi.yaml.
# It auto-regenerates your MCP server on every spec change
# and opens a PR so you can review before merging.

on:
  push:
    paths:
      - 'openapi.yaml'
      - 'openapi.json'
      - 'swagger.yaml'
      - 'swagger.json'
      - 'api/**/*.yaml'
      - 'api/**/*.json'

jobs:
  sync:
    name: Regenerate MCP Server
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Detect spec file
        id: spec
        run: |
          for f in openapi.yaml openapi.json swagger.yaml swagger.json; do
            if [ -f "$f" ]; then
              echo "file=$f" >> $GITHUB_OUTPUT
              break
            fi
          done

      - name: Generate MCP server
        run: npx mcp-bridge generate --spec ${{ steps.spec.outputs.file }} --out ./mcp-server

      - name: Open PR with updated MCP server
        uses: peter-evans/create-pull-request@v6
        with:
          title: 'chore: sync MCP server with API spec changes'
          body: |
            This PR was auto-generated by [mcp-bridge](https://github.com/yourusername/mcp-bridge).

            The OpenAPI spec changed — this updates the MCP server to match.

            **Review the generated tools in `mcp-server/tools/` before merging.**
          branch: auto/sync-mcp-server
          commit-message: 'chore: regenerate MCP server from updated spec'
          labels: 'automated, mcp'
