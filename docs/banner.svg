<svg viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', Courier, monospace">
  <!-- Background -->
  <rect width="900" height="220" fill="#0d1117" rx="12"/>

  <!-- Subtle grid lines -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#161b22" stroke-width="1"/>
    </pattern>
    <linearGradient id="fadeLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d1117" stop-opacity="1"/>
      <stop offset="40%" stop-color="#0d1117" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeRight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="60%" stop-color="#0d1117" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="cyanGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#00ffaa"/>
    </linearGradient>
  </defs>

  <rect width="900" height="220" fill="url(#grid)" rx="12"/>
  <rect width="900" height="220" fill="url(#fadeLeft)" rx="12"/>
  <rect width="900" height="220" fill="url(#fadeRight)" rx="12"/>

  <!-- Animated connector line -->
  <line x1="0" y1="110" x2="900" y2="110" stroke="#1c2a3a" stroke-width="1" stroke-dasharray="6 4"/>

  <!-- LEFT SIDE: REST API Box -->
  <rect x="40" y="60" width="200" height="100" rx="8" fill="#0f1923" stroke="#30363d" stroke-width="1.5"/>
  <text x="140" y="88" text-anchor="middle" fill="#8b949e" font-size="11">REST API</text>
  <text x="140" y="112" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="bold">openapi.yaml</text>
  <text x="140" y="132" text-anchor="middle" fill="#3d7ab5" font-size="10">• /users</text>
  <text x="140" y="148" text-anchor="middle" fill="#3d7ab5" font-size="10">• /products • /orders</text>

  <!-- Arrow from left box -->
  <path d="M 245 110 L 310 110" stroke="#00d4ff" stroke-width="2" marker-end="url(#arrowC)"/>

  <!-- CENTER: mcp-bridge badge -->
  <rect x="310" y="72" width="280" height="76" rx="10" fill="#0f1923" stroke="url(#cyanGlow)" stroke-width="2"/>
  <text x="450" y="104" text-anchor="middle" fill="url(#cyanGlow)" font-size="26" font-weight="bold" letter-spacing="1">mcp-bridge</text>
  <text x="450" y="128" text-anchor="middle" fill="#8b949e" font-size="12">npx mcp-bridge generate --spec api.yaml</text>

  <!-- Arrow to right box -->
  <path d="M 595 110 L 655 110" stroke="#00ffaa" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- RIGHT SIDE: MCP Server Box -->
  <rect x="660" y="60" width="200" height="100" rx="8" fill="#0f1923" stroke="#30363d" stroke-width="1.5"/>
  <text x="760" y="88" text-anchor="middle" fill="#8b949e" font-size="11">MCP Server</text>
  <text x="760" y="112" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">Ready for Claude ✓</text>
  <text x="760" y="132" text-anchor="middle" fill="#388c45" font-size="10">• listUsers • getProduct</text>
  <text x="760" y="148" text-anchor="middle" fill="#388c45" font-size="10">• createOrder • +many more</text>

  <!-- Arrowhead defs -->
  <defs>
    <marker id="arrowC" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00d4ff"/>
    </marker>
    <marker id="arrowG" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00ffaa"/>
    </marker>
  </defs>

  <!-- Bottom tagline -->
  <text x="450" y="198" text-anchor="middle" fill="#484f58" font-size="12">Turn any REST API into an MCP server in 30 seconds · MIT License</text>
</svg>
